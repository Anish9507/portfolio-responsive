<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180" width="300" height="180">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="thumb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>

    <!-- Browser Window Accent -->
    <linearGradient id="window-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <!-- Decorative Circle Grad -->
    <radialGradient id="circ-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Container Box -->
  <rect width="100%" height="100%" fill="url(#thumb-bg)" rx="8" />

  <!-- Background Decorative Shapes -->
  <circle cx="250" cy="40" r="50" fill="url(#circ-grad)" />
  <circle cx="40" cy="140" r="60" fill="#6366f1" opacity="0.1" />

  <!-- Grid Dots Pattern -->
  <g opacity="0.15">
    <circle cx="20" cy="20" r="1.5" fill="#ffffff" /><circle cx="40" cy="20" r="1.5" fill="#ffffff" /><circle cx="60" cy="20" r="1.5" fill="#ffffff" />
    <circle cx="20" cy="40" r="1.5" fill="#ffffff" /><circle cx="40" cy="40" r="1.5" fill="#ffffff" /><circle cx="60" cy="40" r="1.5" fill="#ffffff" />
    <circle cx="20" cy="60" r="1.5" fill="#ffffff" /><circle cx="40" cy="60" r="1.5" fill="#ffffff" /><circle cx="60" cy="60" r="1.5" fill="#ffffff" />
  </g>

  <!-- Mockup Browser Window -->
  <g transform="translate(30, 25)">
    <!-- Browser Shadow/Glow -->
    <rect x="-2" y="-2" width="244" height="134" rx="8" fill="#000000" opacity="0.4" />
    
    <!-- Browser Border/Frame -->
    <rect x="0" y="0" width="240" height="130" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1.5" />
    
    <!-- Browser Header Bar -->
    <path d="M 0,6 A 6,6 0 0 1 6,0 L 234,0 A 6,6 0 0 1 240,6 L 240,24 L 0,24 Z" fill="#111827" />
    
    <!-- Window Control Dots -->
    <circle cx="12" cy="12" r="4" fill="#ef4444" />
    <circle cx="24" cy="12" r="4" fill="#f59e0b" />
    <circle cx="36" cy="12" r="4" fill="#10b981" />
    
    <!-- Browser URL Bar -->
    <rect x="52" y="5" width="140" height="14" rx="4" fill="#1f2937" />
    <line x1="60" y1="12" x2="100" y2="12" stroke="#4b5563" stroke-width="2" stroke-linecap="round" />

    <!-- Main Window Content Mockup -->
    <!-- Sidebar -->
    <rect x="10" y="34" width="45" height="86" rx="4" fill="#111827" opacity="0.7" />
    <rect x="18" y="44" width="29" height="5" rx="2" fill="#4b5563" />
    <rect x="18" y="56" width="20" height="4" rx="2" fill="#374151" />
    <rect x="18" y="66" width="25" height="4" rx="2" fill="#374151" />
    <rect x="18" y="76" width="22" height="4" rx="2" fill="#374151" />

    <!-- Main Content Area Grid layout -->
    <g transform="translate(65, 34)">
      <!-- Banner/Header -->
      <rect x="0" y="0" width="165" height="24" rx="4" fill="url(#window-accent)" />
      <!-- Banner code brackets -->
      <path d="M 15,7 L 10,12 L 15,17 M 30,7 L 35,12 L 30,17 M 25,6 L 20,18" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9" />
      <line x1="45" y1="12" x2="110" y2="12" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8" />

      <!-- Columns (CSS Grid Mockup) -->
      <rect x="0" y="32" width="50" height="54" rx="4" fill="#111827" />
      <circle cx="25" cy="52" r="10" fill="#6366f1" opacity="0.3" />
      <rect x="8" y="72" width="34" height="4" rx="2" fill="#4b5563" />
      <rect x="12" y="80" width="26" height="3" rx="1.5" fill="#374151" />

      <rect x="58" y="32" width="50" height="54" rx="4" fill="#111827" />
      <circle cx="83" cy="52" r="10" fill="#a855f7" opacity="0.3" />
      <rect x="66" y="72" width="34" height="4" rx="2" fill="#4b5563" />
      <rect x="70" y="80" width="26" height="3" rx="1.5" fill="#374151" />

      <rect x="116" y="32" width="49" height="54" rx="4" fill="#111827" />
      <circle cx="140" cy="52" r="10" fill="#f43f5e" opacity="0.3" />
      <rect x="124" y="72" width="33" height="4" rx="2" fill="#4b5563" />
      <rect x="128" y="80" width="25" height="3" rx="1.5" fill="#374151" />
    </g>
  </g>
</svg>
