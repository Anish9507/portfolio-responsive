<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    
    <!-- Face Gradient -->
    <linearGradient id="face-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffedd5" />
      <stop offset="100%" stop-color="#fed7aa" />
    </linearGradient>

    <!-- Hair Gradient -->
    <linearGradient id="hair-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    
    <!-- Clothes Gradient -->
    <linearGradient id="clothes-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Screen Glow -->
    <radialGradient id="screen-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Circular Mask/Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-grad)" />

  <!-- Screen Glow in background of character -->
  <circle cx="100" cy="130" r="70" fill="url(#screen-glow)" />

  <!-- Character Group -->
  <g id="character">
    <!-- Neck -->
    <rect x="90" y="115" width="20" height="25" fill="#fdba74" rx="4" />
    
    <!-- Shoulders / Clothes -->
    <path d="M 40,165 C 40,135 70,125 100,125 C 130,125 160,135 160,165 L 160,200 L 40,200 Z" fill="url(#clothes-grad)" />
    
    <!-- Tech Logo on Hoodie / Shirt -->
    <path d="M 95,145 L 90,150 L 95,155 M 105,145 L 110,150 L 105,155 M 102,143 L 98,157" stroke="#db2777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />

    <!-- Hair Back (Longer hair or cap back) -->
    <path d="M 65,70 C 65,50 80,45 100,45 C 120,45 135,50 135,70 C 135,90 65,90 65,70 Z" fill="url(#hair-grad)" />

    <!-- Ears -->
    <circle cx="68" cy="88" r="8" fill="#fdba74" />
    <circle cx="132" cy="88" r="8" fill="#fdba74" />

    <!-- Head / Face -->
    <path d="M 70,82 C 70,68 80,68 100,68 C 120,68 130,68 130,82 C 130,105 120,118 100,118 C 80,118 70,105 70,82 Z" fill="url(#face-grad)" />
    
    <!-- Glasses -->
    <g stroke="#312e81" stroke-width="3" fill="none">
      <!-- Left frame -->
      <rect x="76" y="80" width="18" height="14" rx="3" fill="#ffffff" fill-opacity="0.2" />
      <!-- Right frame -->
      <rect x="106" y="80" width="18" height="14" rx="3" fill="#ffffff" fill-opacity="0.2" />
      <!-- Bridge -->
      <line x1="94" y1="87" x2="106" y2="87" />
      <!-- Sidebars -->
      <path d="M 76,84 L 69,83" />
      <path d="M 124,84 L 131,83" />
    </g>

    <!-- Eyes (behind glasses) -->
    <circle cx="85" cy="87" r="2" fill="#1e1b4b" />
    <circle cx="115" cy="87" r="2" fill="#1e1b4b" />

    <!-- Nose -->
    <path d="M 98,92 Q 100,96 102,92" stroke="#f97316" stroke-width="2" stroke-linecap="round" fill="none" />

    <!-- Smile -->
    <path d="M 92,104 Q 100,110 108,104" stroke="#e11d48" stroke-width="2" stroke-linecap="round" fill="none" />

    <!-- Hair Front / Bangs -->
    <path d="M 68,75 C 68,55 80,50 100,50 C 120,50 132,55 132,75 C 120,60 115,70 100,60 C 85,70 80,60 68,75 Z" fill="url(#hair-grad)" />
  </g>

  <!-- Decorative Sparkles / Floating Code Elements -->
  <g opacity="0.8">
    <circle cx="35" cy="50" r="3" fill="#67e8f9" />
    <circle cx="165" cy="65" r="4" fill="#a7f3d0" />
    <path d="M 155,120 L 165,120 M 160,115 L 160,125" stroke="#fef08a" stroke-width="2" stroke-linecap="round" />
    <text x="30" y="115" fill="#fef08a" font-family="monospace" font-size="14" font-weight="bold">&lt;/&gt;</text>
    <text x="145" y="45" fill="#67e8f9" font-family="monospace" font-size="14" font-weight="bold">{ }</text>
  </g>
</svg>
